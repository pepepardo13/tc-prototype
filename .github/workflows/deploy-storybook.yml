name: Build and Publish Storybook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Authenticate with GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          echo "@envato:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Resolve Pages base path
        id: pages
        run: |
          PAGES_URL=$(gh api repos/${{ github.repository }}/pages --jq '.html_url')
          BASE=$(python3 -c "from urllib.parse import urlparse; p=urlparse('$PAGES_URL').path; print(p if p else '/')")
          echo "base=$BASE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Storybook
        run: npm run build-storybook
        env:
          BASE_PATH: ${{ steps.pages.outputs.base }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ github.token }}
